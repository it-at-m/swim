name: "pr-labeler"

on:
  - pull_request_target

jobs:
  pr-labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: "Label PR"
        uses: it-at-m/lhm_actions/action-templates/actions/action-pr-labeler@7cb754b2056cebda6c36db344434f85be398c493 # v1.0.25
