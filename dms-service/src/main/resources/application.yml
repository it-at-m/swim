spring:
  main:
    banner-mode: console
  application:
    name: @project.artifactId@
    group: @project.groupId@
    version: @project.version@
  web:
    error:
      include-exception: false
      include-stacktrace: never
      whitelabel:
        enabled: false
  cloud:
    stream:
      default:
        consumer:
          max-attempts: 1
      kafka:
        default:
          consumer:
            ack-mode: record
        binder:
          auto-create-topics: false
          consumerProperties:
            max:
              poll:
                records: 20
            auto:
              offset:
                reset: latest
  kafka:
    consumer:
      properties:
        spring:
          json:
            trusted:
              packages: '*'

# Config for spring actuator endpoints
management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: health, info, prometheus
      path-mapping:
        prometheus: metrics
  endpoint:
    health:
      access: read_only
      probes:
        enabled: true
    info:
      access: read_only
    prometheus:
      access: read_only
  info:
    env:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: info
    "org.apache.kafka": warn
  structured:
    format:
      console: logstash
    json:
      stacktrace:
        root: first
        # default max size of one log line in docker is 16kb - UTF8 ~ 1 Character = 1 Byte
        # therefore limit stack traces to a maximum of 8192 characters (to leave room for the rest of the message)
        max-length: 8192
      add:
        application_name: ${spring.application.name}
        application_group: ${spring.application.group}

info:
  application:
    name: ${spring.application.name}
    version: ${spring.application.version}
    group: ${spring.application.group}
    description: @project.description@
  build:
    java.version: @java.version@
    spring-cloud.version: @spring-cloud-dependencies.version@

swim:
  metadata-dms-target-key: "SWIM_DMS_Target"
  metadata-subject-prefix: "FdE_"
  metadata-user-inbox:
    coo-key: "PPK_COO"
    user-key: "PPK_Username"
    job-oe-key: "PPK_Joboe"
    job-position-key: "PPK_Jobposition"
  metadata-group-inbox:
    coo-key: "GPK_COO"
    user-key: "GPK_Username"
    job-oe-key: "GPK_Joboe"
    job-position-key: "GPK_Jobposition"
  metadata-incoming:
    coo-key: "VG_COO"
    user-key: "VG_Username"
    job-oe-key: "VG_Joboe"
    job-position-key: "VG_Jobposition"
  metadata-shadow-file:
    coo-key: "A_COO"
    user-key: "A_Username"
    job-oe-key: "A_Joboe"
    job-position-key: "A_Jobposition"
