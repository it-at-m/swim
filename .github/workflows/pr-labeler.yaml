name: "pr-labeler"

on:
  - pull_request_target

jobs:
  pr-labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: "Label PR"
        uses: it-at-m/lhm_actions/action-templates/actions/action-pr-labeler@1a673d9c3be4a4f59cf29f425bc2b00fc42751fd # v1.0.32
