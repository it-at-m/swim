name: release

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to release'
        type: choice
        required: true
        options:
          - matching-service
          - dispatch-service
          - handler-core
          - dms-service
          - invoice-service
          - dipa-service
      release-version:
        description: 'Release version'
        type: string
        required: true
        default: "X.Y.Z"
      next-version:
        description: "Next version to use after release"
        type: string
        required: true
        default: "X.Y.Z-SNAPSHOT"
      tag-latest:
        type: boolean
        description: "Tag images with latest"
        required: true
        default: true

jobs:
  release-maven-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # can be removed if use-pr is 'false'
    outputs:
      MVN_ARTIFACT_ID: ${{ steps.release-maven-artifact.outputs.MVN_ARTIFACT_ID }}
      ARTIFACT_NAME: ${{ steps.release-maven-artifact.outputs.artifact-name }}
    env:
      TZ: Europe/Berlin
    steps:
      - id: release-maven-artifact
        uses: it-at-m/lhm_actions/action-templates/actions/action-maven-release@877aafa9f0732cbc91819b60d237c351ea88f95c # v1.0.34
        with:
          app-path: ${{ inputs.module }}
          java-version: "21"
          releaseVersion: ${{ inputs.release-version }}
          developmentVersion: ${{ inputs.next-version }}
          use-pr: true
          GPG_PRIVATE_KEY: ${{ secrets.gpg_private_key }}
          SIGN_KEY_PASS: ${{ secrets.gpg_passphrase }}
          CENTRAL_USERNAME: ${{ secrets.sonatype_username }}
          CENTRAL_PASSWORD: ${{ secrets.sonatype_password }}

  release-maven-image:
    if: ${{ inputs.module != 'handler-core' }}
    runs-on: ubuntu-latest
    needs: release-maven-artifact
    permissions:
      packages: write
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-build-image@877aafa9f0732cbc91819b60d237c351ea88f95c # v1.0.34
        with:
          path: "./${{ inputs.module }}"
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: ${{ needs.release-maven-artifact.outputs.ARTIFACT_NAME }}
          image-name: ${{ inputs.module }}
          image-tags: |
            type=raw,value=${{ inputs.release-version }}
            type=raw,value=latest,enable=${{ inputs.tag-latest == true }}

  create-github-release:
    if: ${{ !failure() && !cancelled() }}
    needs: ["release-maven-artifact", "release-maven-image"]
    runs-on: ubuntu-latest
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-create-github-release@877aafa9f0732cbc91819b60d237c351ea88f95c # v1.0.34
        with:
          tag-name: "${{ inputs.module }}_${{ github.event.inputs.release-version }}"
          generate-release-notes: true
          artifact-name: ${{ needs.release-maven-artifact.outputs.ARTIFACT_NAME }}
          artifact-path: "./${{ inputs.module }}/target/${{ inputs.module }}-*.jar"
