name: "pr-labeler"

on:
  - pull_request_target

jobs:
  pr-labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: "Label PR"
        uses: it-at-m/lhm_actions/action-templates/actions/action-pr-labeler@acb09213786b76dd7aa52ec1d901390d28c60eb0 # v1.0.29
